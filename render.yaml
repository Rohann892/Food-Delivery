services:
  - type: web
    name: food-delivery-backend
    runtime: node
    rootDir: Backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: USER_EMAIL
        sync: false
      - key: APP_PASSWORD
        sync: false
      - key: CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: RAZORPAY_API_KEY
        sync: false
      - key: RAZORPAY_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
